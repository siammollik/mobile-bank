<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- outfit font from google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class=" logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance_info">
                    <h2 class="text-2xl font-bold">$<span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="login.html" class="btn btn-soft rounded-xl"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>


    </header>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="buttons grid grid-cols-3 gap-4">
            <button onclick="showOnly('addmoney')" class="btn btn-primary btn-soft flex-col h-full rounded-xl py-4">
                <img src="./assets/opt-1.png" alt="">
                <p class="text-neutral/70">Add Money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn btn-primary btn-soft flex-col h-full rounded-xl py-4">
                <img src="./assets/opt-2.png" alt="">
                <p class="text-neutral/70">Cashout</p>
            </button>
            <button onclick="showOnly('transfer-money')" class="btn btn-primary btn-soft flex-col h-full rounded-xl py-4">
                <img src="./assets/opt-3.png" alt="">
                <p class="text-neutral/70 whitespace-nowrap ">Transfer Money</p>
            </button>
            <button onclick="showOnly('get-bonus')" class="btn btn-primary btn-soft flex-col h-full rounded-xl py-4">
                <img src="./assets/opt-4.png" alt="">
                <p class="text-neutral/70">Get Bonus</p>
            </button>
            <button onclick="showOnly('pay-bill')" class="btn btn-primary btn-soft flex-col h-full rounded-xl py-4">
                <img src="./assets/opt-5.png" alt="">
                <p class="text-neutral/70">Pay Bill</p>
            </button>
            <button onclick="showOnly('history')" class="btn btn-primary btn-soft flex-col h-full rounded-xl py-4">
                <img src="./assets/opt-6.png" alt="">
                <p class="text-neutral/70">Transactions</p>
            </button>
          
        </div>
    </section>

    <section  id="addmoney" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-5">Add Money</h2>
        <div class="card bg-base-100 w-full shadow-xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">

                    <label class="label text-neutral font-bold bg-base-200 ">Select A Bank</label>
                    <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
                        <option disabled selected>Select bank</option>
                        <option value="One Bank">One Bank</option>
                        <option value="Islami Bank">Islami Bank</option>
                        <option value="Sonali Bank">Sonali Bank</option>
                    </select>

                    <br>

                    <label class="label text-neutral font-bold bg-base-200 ">Bank Account Number</label>
                    <input id="add-money-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit account number" />
                    <br>

                    <label class="label text-neutral font-bold bg-base-200 ">Amount to Add</label>
                    <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Add Amount to withdraw" />
                    <br>

                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="add-money-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <button  id="add-money-btn" class="btn btn-primary rounded-full mt-4">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-5">Cash Out</h2>
        <div class="card bg-base-100 w-full shadow-xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold bg-base-200 ">Agent Number</label>
                    <input id="cashout-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-200 w-full" value="01815985119" placeholder="Enter 11 Digit Number" />
                    <br>

                    <label class="label text-neutral font-bold bg-base-200 ">Amount</label>
                    <input id="cashout-Amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter amount to withdraw" />
                    <br>

                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="cashout-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <button id="cashout-btn" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="transfer-money" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-5">Transfer Money</h2>
        <div class="card bg-base-100 w-full shadow-xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold bg-base-200 ">User Account Number</label>
                    <input id="transfer-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-200 w-full" value="01815985119" placeholder="Enter 11 Digit Number" />
                    <br>

                    <label class="label text-neutral font-bold bg-base-200 ">Amount</label>
                    <input id="transfer-Amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter amount to transfer" />
                    <br>

                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="transfer-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <button id="transfer-btn" class="btn btn-primary rounded-full mt-4">send Now</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="get-bonus" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-5">Get Bonus</h2>
        <div class="card bg-base-100 w-full shadow-xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold bg-base-200 ">Enter Bonus Coupon</label>
                    <input id="coupon-number" type="text"
                        class="input rounded-full bg-base-200 w-full"placeholder="Enter your coupon" />
                    <br>
                    <button id="get-bonus-btn" class="btn btn-primary rounded-full mt-4">get Bonus</button>
                </fieldset>
            </div>
        </div>
    </section>

     <section  id="pay-bill" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-5">Pay Bill</h2>
        <div class="card bg-base-100 w-full shadow-xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">

                    <label class="label text-neutral font-bold bg-base-200 ">Select To Pay</label>
                    <select id="pay-bill-back" class="select w-full bg-base-200 rounded-full">
                        <option disabled selected>Select Back</option>
                        <option value="One Bank">Electricity</option>
                        <option value="Islami Bank">Gas</option>
                        <option value="Sonali Bank">Water</option>
                    </select>

                    <br>

                    <label class="label text-neutral font-bold bg-base-200 ">Biller Account Number</label>
                    <input id="pay-bill-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter account number" />
                    <br>

                    <label class="label text-neutral font-bold bg-base-200 ">Amount to Pay</label>
                    <input id="pay-bill-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Add Amount to pay" />
                    <br>

                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="pay-bill-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <button  id="pay-bill-btn" class="btn btn-primary rounded-full mt-4">Pay Now</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="history"  class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-5">Transaction History</h2>
        <div class="space-y-5" id="history-container">

        </div>
    </section>



    <script src="./script/machine.js"></script>
    <script src="./script/addMoney.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/transfer-money.js"></script>
    <script src="./script/getBonus.js"></script>
    <script src="./script/pay-bill.js"></script>
</body>

</html>
